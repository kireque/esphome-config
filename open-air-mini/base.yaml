---
# Device: Open Air mini board (ESP32)
# Config based on: https://github.com/Flamingo-tech/Open-AIR/blob/main/Open%20AIR%20Mini/Software/open-air-mini.yaml
# GPIOs: motor=GPIO15, rpm=GPIO14, status_led=GPIO33, uart_sensor1_rx=GPIO25, uart_sensor1_tx=GPIO26, uart_sensor2_rx=GPIO13, uart_sensor2_tx=GPIO12

esp32:
  board: esp32dev
  framework:
    type: arduino

packages:
  common: !include ../esphome-common/base.yaml
  wifi: !include ../esphome-common/wifi.yaml

web_server:
  port: 80
  auth:
    username: admin
    password: !secret web_password

globals:
  - id: disconnected_max_fan_speed
    type: int
    restore_value: no
    initial_value: "100"
  - id: disconnected_medium_fan_speed
    type: int
    restore_value: no
    initial_value: "60"
  - id: disconnected_default_fan_speed
    type: int
    restore_value: no
    initial_value: "25"
  - id: disconnected_hum_level_max_speed
    type: int
    restore_value: no
    initial_value: "75"
  - id: disconnected_hum_level_medium_speed
    type: int
    restore_value: no
    initial_value: "55"

uart:
  - rx_pin: GPIO13
    tx_pin: GPIO12
    baud_rate: 9600
    id: uart_sensor_2
  - rx_pin: GPIO25
    tx_pin: GPIO26
    baud_rate: 9600
    id: uart_sensor_1

i2c:
  - id: i2c_sensor_2
    sda: GPIO19
    scl: GPIO18
    scan: false
    frequency: 400kHz
  - id: i2c_sensor_1
    sda: GPIO16
    scl: GPIO4
    scan: false
    frequency: 400kHz

status_led:
  pin:
    number: GPIO33

output:
  - platform: ledc
    pin: GPIO15
    inverted: true
    id: open_air_mini

fan:
  - platform: speed
    output: open_air_mini
    name: "Open AIR Mini"
    id: fan_motor

sensor:
  - platform: pulse_counter
    pin: GPIO14
    unit_of_measurement: "RPM"
    name: "AIR Mini RPM"

  - platform: senseair
    uart_id: uart_sensor_2
    co2:
      name: "Open Duco CO2 Value"
    update_interval: 60s

script:
  - id: disconnected_mode
    mode: single
    then:
      - logger.log: "Disconnected Mode Triggered"
      - fan.turn_on:
          id: fan_motor
          speed: !lambda |-
            return id(disconnected_default_fan_speed);

interval:
  - interval: 30s
    then:
      - logger.log: "API Connectivity Check for Disconnected Mode"
      - if:
          condition:
            not:
              api.connected:
          then:
            - logger.log: "API disconnected"
            - script.execute: disconnected_mode
          else:
            - logger.log: "API connected"
            - script.stop: disconnected_mode
