---
# Device: M5Stack Atom Lite
# Location: Bedroom Job
# Description: WS2812 RGB LED strip (8 LEDs) with button control for color selection
# LED GPIO: 26
# Button: GPIO25 (external button, pulled up, active low)

packages:
  <<: !include_dir_named ../components/common
  wifi: !include ../components/hardware/wifi.yaml
  board: !include ../boards/m5stack-atom.yaml

globals:
  - id: color_mode
    type: int
    restore_value: yes
    initial_value: "1"

web_server:
  port: 80

sensor:
  - platform: homeassistant
    id: sleep_hour
    name: "Slaaptijd uur"
    entity_id: input_datetime.job_rocket_sleep
    attribute: hour
  - platform: homeassistant
    id: sleep_minute
    name: "Slaaptijd minuut"
    entity_id: input_datetime.job_rocket_sleep
    attribute: minute
  - platform: homeassistant
    id: wakeup_hour
    name: "Opstaan uur"
    entity_id: input_datetime.job_rocket_wakeup
    attribute: hour
  - platform: homeassistant
    id: wakeup_minute
    name: "Opstaan minuut"
    entity_id: input_datetime.job_rocket_wakeup
    attribute: minute

light:
  - platform: neopixelbus
    name: "LED Strip"
    icon: mdi:led-strip-variant
    id: led_strip
    pin: GPIO26
    num_leds: 8
    variant: WS2812
    type: GRB
    default_transition_length: 500ms
    restore_mode: RESTORE_DEFAULT_OFF
    effects:
      - random:
          name: "Random Colors"
          transition_length: 1s
          update_interval: 1s

script:
  - id: apply_color
    then:
      - if:
          condition:
            lambda: 'return id(color_mode) == 1;'
          then:
            - light.turn_on:
                id: led_strip
                brightness: 30%
                red: 100%
                green: 0%
                blue: 0%
      - if:
          condition:
            lambda: 'return id(color_mode) == 2;'
          then:
            - light.turn_on:
                id: led_strip
                brightness: 30%
                red: 0%
                green: 100%
                blue: 0%
      - if:
          condition:
            lambda: 'return id(color_mode) == 3;'
          then:
            - light.turn_on:
                id: led_strip
                brightness: 30%
                red: 100%
                green: 65%
                blue: 0%

  - id: auto_off
    mode: restart
    then:
      - delay: 1h
      - light.turn_off: led_strip

interval:
  - interval: 60s
    then:
      - lambda: |-
          auto now = id(time_sntp).now();
          if (!now.is_valid()) return;

          int now_total = now.hour * 60 + now.minute;

          int sleep_total = (int)id(sleep_hour).state * 60 + (int)id(sleep_minute).state;
          int wakeup_total = (int)id(wakeup_hour).state * 60 + (int)id(wakeup_minute).state;
          int wakeup_minus15 = wakeup_total - 15;

          if (now_total == sleep_total) {
            id(color_mode) = 1;
            id(apply_color).execute();
          }
          else if (now_total == wakeup_minus15) {
            id(color_mode) = 3;
            id(apply_color).execute();
          }
          else if (now_total == wakeup_total) {
            id(color_mode) = 2;
            id(apply_color).execute();
            id(auto_off).execute();
          }

binary_sensor:
  - platform: gpio
    pin:
      number: GPIO25
      inverted: true
      mode:
        input: true
        pullup: true
    name: "Button"
    id: button_main
    filters:
      - delayed_on_off: 20ms
    on_multi_click:
      - timing:
          - ON for at most 500ms
          - OFF for at least 350ms
        then:
          - if:
              condition:
                light.is_on: led_strip
              then:
                - light.turn_off: led_strip
                - script.stop: auto_off
              else:
                - script.execute: apply_color
      - timing:
          - ON for at most 500ms
          - OFF for at most 350ms
          - ON for at most 500ms
          - OFF for at least 350ms
        then:
          - lambda: |-
              id(color_mode) = (id(color_mode) % 3) + 1;
          - script.execute: apply_color